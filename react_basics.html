<!DOCTYPE html>
<html>
<head>
    <title>React Todo List</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 2rem auto; background: #0f0f0f; color: white; padding: 1rem; }
        button { background: #1D9E75; color: white; border: none; padding: 8px 16px; border-radius: 99px; cursor: pointer; margin: 4px; font-size: 14px; }
        input { background: #1a1a1a; color: white; border: 1px solid #333; padding: 8px 12px; border-radius: 8px; margin: 4px; width: 60%; font-size: 14px; }
        .todo { background: #1a1a1a; border-radius: 8px; padding: 1rem; margin: 0.5rem 0; display: flex; justify-content: space-between; align-items: center; }
        .done { opacity: 0.5; text-decoration: line-through; }
        .delete { background: #e74c3c; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React

        function TodoApp() {
            const [todos, setTodos] = useState([])
            const [input, setInput] = useState("")

            function addTodo() {
                if (!input.trim()) return
                setTodos([...todos, { text: input, done: false }])
                setInput("")
            }

            function toggleTodo(index) {
                const updated = todos.map((todo, i) =>
                    i === index ? { ...todo, done: !todo.done } : todo
                )
                setTodos(updated)
            }

            function deleteTodo(index) {
                setTodos(todos.filter((_, i) => i !== index))
            }

            return (
                <div>
                    <h1>Todo List 📝</h1>
                    <input
                        value={input}
                        onChange={e => setInput(e.target.value)}
                        onKeyPress={e => e.key === 'Enter' && addTodo()}
                        placeholder="Add a todo..."
                    />
                    <button onClick={addTodo}>Add</button>
                    <p>{todos.filter(t => t.done).length} of {todos.length} done</p>
                    {todos.map((todo, index) => (
                        <div key={index} className="todo">
                            <span
                                className={todo.done ? "done" : ""}
                                onClick={() => toggleTodo(index)}
                                style={{cursor: "pointer"}}
                            >
                                {todo.text}
                            </span>
                            <button className="delete" onClick={() => deleteTodo(index)}>Delete</button>
                        </div>
                    ))}
                </div>
            )
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<TodoApp />)
    </script>
</body>
</html>
